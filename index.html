<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <title>Flowers & Fireflies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="audio" src="music.mp3" loop></audio>

    <div id="scene1" class="scene active">
        <div class="garden-container">
            <div class="night-sky"></div>
            <div class="stars"></div>
            <div class="clouds"></div>
            <div class="ground"></div>
            <div class="garden"></div>
            <div class="fireflies"></div>
        </div>
        <button id="next1" class="nav-btn hidden" onclick="goToLetters()">Цааш</button>
    </div>

    <div id="scene2" class="scene hidden">
        <div class="letter-box">
            <div id="letterBtns">
                <button id="lBtn1" class="action-btn" onclick="openLetter(1)">Захиа 1</button>
                <button id="lBtn2" class="action-btn" onclick="openLetter(2)">Захиа 2</button>
            </div>
            <div id="letterDisplay" class="hidden">
                <p id="textContent" style="white-space: pre-wrap; color: #333;"></p>
                <button class="action-btn" onclick="closeLetter()">Буцах / Цааш</button>
            </div>
        </div>
    </div>

    <div id="scene3" class="scene hidden">
        <h2 style="margin-bottom: 20px;">Танд зориулсан бэлэг...</h2>
        <button class="action-btn" onclick="goToCake()">Бэлгийг нээх</button>
    </div>

    <div id="scene4" class="scene hidden">
        <div class="cake-container">
            <div class="cake">
                <div class="plate"></div>
                <div class="layer layer-bottom"></div>
                <div class="layer layer-middle"></div>
                <div class="layer layer-top"></div>
                <div class="icing"></div>
                <div class="candle"><div class="flame"></div></div>
            </div>
        </div>
        <button id="cakeNext" class="nav-btn hidden" onclick="goToPhoto()">Дараагийнх</button>
    </div>

    <div id="scene5" class="scene hidden">
        <div class="photo-frame">
            <p>Энд та өөрийн зураг эсвэл зурагтай контейнероо хийж болно</p>
        </div>
        <button class="nav-btn" onclick="goToFinal()">Төгсгөл</button>
    </div>

    <div id="scene6" class="scene hidden">
        <h1>Төрсөн өдрийн мэдээ хүргэе! 🎂</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
