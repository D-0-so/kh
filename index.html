<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="audio" src="3.mp3"></audio>

    <div id="scene1" class="scene">
        <svg id='svg' width='400px' viewBox="0 0 188 264" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="gradient-0" gradientUnits="userSpaceOnUse" cx="-107.308" cy="104.329" r="59.181" gradientTransform="matrix(0.261752, 0.411262, -0.686293, 0.596934, 160.094667, 49.38985)">
                    <stop offset="0" style="stop-color: rgb(255, 0, 0);"/>
                    <stop offset="1" style="stop-color: rgb(141, 41, 41);"/>
                </radialGradient>
                <radialGradient id="gradient-1" gradientUnits="userSpaceOnUse" cx="113.342" cy="62.644" r="53.882" gradientTransform="matrix(-0.169507, 1.182475, -0.714039, -0.308382, 160.212434, -46.522622)">
                    <stop offset="0" style="stop-color: rgb(255, 0, 0);"/>
                    <stop offset="1" style="stop-color: rgb(141, 41, 41);"/>
                </radialGradient>
                <linearGradient id="gradient-16" gradientUnits="userSpaceOnUse" x1="79.232" y1="148.661" x2="79.232" y2="267.785" gradientTransform="matrix(0.025831, -0.999666, 0.153237, 0.00396, 43.953685, 274.434674)">
                    <stop offset="0" style="stop-color: #bada55"/>
                    <stop offset="1" style="stop-color: rgb(59, 72, 14);"/>
                </linearGradient>
            </defs>
            <path d="M 73.281 159.571 C 72.647 190.375 75.055 224.982 80.506 263.392 C 81.129 267.785 93.817 263.392 93.817 263.392 C 92.284 264.35 81.135 187.678 88.112 161.093 C 90.388 152.419 77.266 148.661 73.281 159.571 Z" style="stroke: rgba(0, 0, 0, 0); fill: url(#gradient-16);">
                <animate id='animate0' begin='0s' fill='freeze' attributeName='d' dur='12000ms' to="M 69.281 159.571 C 68.647 190.375 71.055 224.982 76.506 263.392 C 77.129 267.785 89.817 263.392 89.817 263.392 C 88.284 264.35 77.135 187.678 84.112 161.093 C 86.388 152.419 73.266 148.661 69.281 159.571 Z"/>
            </path>
        </svg>
        <button id="next1" class="hidden" onclick="goToLetters()">Цааш</button>
    </div>

    <div id="scene2" class="scene hidden">
        <div id="letterBtns">
            <button id="lBtn1" onclick="openLetter(1)">Захиа 1</button>
            <button id="lBtn2" onclick="openLetter(2)">Захиа 2</button>
        </div>
        <div id="letterDisplay" class="hidden letter-box">
            <p id="textContent"></p>
            <button onclick="closeLetter()">Буцах / Цааш</button>
        </div>
    </div>

    <div id="scene3" class="scene hidden letter-box">
        <p>내가 아는 사람들 중에서 가장 멋지고 노력하는 너에게, 이 세상에 태어나 이렇게 특별한 사람이 되어줘서 고마워. 생일 진심으로 축하해!</p>
        <button onclick="goToCake()">Цааш</button>
    </div>

    <div id="scene4" class="scene hidden">
        <div class="cake">
            <div class="plate"></div>
            <div class="layer layer-bottom"></div>
            <div class="layer layer-middle"></div>
            <div class="layer layer-top"></div>
            <div class="icing"></div>
            <div class="drip drip1"></div>
            <div class="drip drip2"></div>
            <div class="drip drip3"></div>
            <div class="candle"><div class="flame"></div></div>
        </div>
        <button id="cakeNext" class="hidden" onclick="goToPhoto()">Цааш</button>
    </div>

    <div id="scene5" class="scene hidden">
        <div class="img-container">
            <div class="star-shooting"></div>
            <img src=".jpg" alt="Birthday Image">
        </div>
        <button onclick="goToFinal()">Цааш</button>
    </div>

    <div id="scene6" class="scene hidden">
        <h1>Баярлалаа ❤️</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
